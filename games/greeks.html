<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Position Risks</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body class="game-page">

  <div class="top-bar">
    <div class="top-bar-left">
      <span class="top-bar-title">Position Risks</span>
      <a href="../index.html" class="back-link">← Back</a>
    </div>
    <div id="top-bar-right" class="top-bar-right hidden">
      <span class="score-display">Score: <span id="score-value">0</span></span>
    </div>
  </div>

  <div id="timer-wrap" class="timer-bar-wrap hidden">
    <div id="timer-bar" class="timer-bar" style="width:100%"></div>
  </div>
  <div id="timer-label" class="timer-label hidden"></div>

  <!-- Setup screen -->
  <div id="setup-screen" class="setup-overlay">
    <div class="setup-box">

      <label class="setup-label">Session duration</label>
      <select id="duration-select" class="duration-select">
        <option value="60">1 min</option>
        <option value="120" selected>2 min</option>
        <option value="300">5 min</option>
        <option value="900">15 min</option>
        <option value="1800">30 min</option>
        <option value="3600">60 min</option>
      </select>

      <label class="setup-label">Mode</label>
      <select id="mode-select" class="duration-select mode-select">
        <option value="named" selected>Named positions</option>
        <option value="custom">Random positions</option>
        <option value="both">Both</option>
      </select>

      <label class="setup-label">Greeks to be tested on</label>
      <div class="setup-checklist">
        <label><input type="checkbox" class="greek-check" value="delta"     checked> Delta</label>
        <label><input type="checkbox" class="greek-check" value="gamma"     checked> Gamma</label>
        <label><input type="checkbox" class="greek-check" value="theta"     checked> Theta</label>
        <label><input type="checkbox" class="greek-check" value="vega"      checked> Vega</label>
        <label><input type="checkbox" class="greek-check" value="rho"            > Rho</label>
        <label><input type="checkbox" class="greek-check" value="vanna"          > Vanna</label>
        <label><input type="checkbox" class="greek-check" value="charm"          > Charm</label>
        <label><input type="checkbox" class="greek-check" value="volga"          > Volga</label>
        <label><input type="checkbox" class="greek-check" value="vegaDecay"      > Vega Decay</label>
        <label><input type="checkbox" class="greek-check" value="speed" data-named-only> Speed *</label>
        <label><input type="checkbox" class="greek-check" value="zomma" data-named-only> Zomma *</label>
        <label><input type="checkbox" class="greek-check" value="color" data-named-only> Color *</label>
      </div>
      <p class="setup-note">* Named positions only</p>

      <button id="start-btn" class="btn">Start</button>
    </div>
  </div>

  <!-- Game screen -->
  <div id="game-screen" class="game-center hidden">
    <div class="round-card">
      <div id="position-display"></div>

      <div class="greek-question-row">
        <div id="greek-question" class="greek-question"></div>
        <div class="sign-btn-group">
          <button class="sign-btn" data-sign="-">−</button>
          <button class="sign-btn" data-sign="~0">~0</button>
          <button class="sign-btn" data-sign="+">+</button>
        </div>
      </div>

      <button id="submit-btn" class="btn" disabled>Submit</button>
      <div id="feedback" class="feedback"></div>
    </div>
  </div>

  <!-- End screen -->
  <div id="end-screen" class="game-center hidden">
    <div class="end-box">
      <h2>Time's up</h2>
      <div class="final-score">
        <span id="final-score">0</span>
        <span class="label">correct answers</span>
      </div>
      <p id="last-answer" class="missed-answer"></p>
      <button id="play-again-btn" class="btn">Play again</button>
    </div>
  </div>

  <script src="../js/greeks.js"></script>
</body>
</html>
